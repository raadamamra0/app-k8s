apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: college
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      # Cette partie est CRUCIALE car ton code cherche l'hôte "postgres"
      hostAliases:
      - ip: "192.168.20.147"
        hostnames:
        - "postgres"
      
      containers:
      - name: flask-app
        image: raadamamra0/mon-app-college:3.3
        ports:
        - containerPort: 5000
        env:
        - name: APP_USER
          value: "professeur"
        - name: APP_PASS
          value: "Reponse2024"
