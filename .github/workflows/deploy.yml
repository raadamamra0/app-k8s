name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update Kubernetes Deployment
        run: |
          export KUBECONFIG=/home/devops/.kube/config
          kubectl apply -f deployment.yaml -n college
          kubectl rollout restart deployment flask-app -n college
